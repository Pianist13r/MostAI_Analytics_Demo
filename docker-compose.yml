services:

  db:
    image: postgres:15
    container_name: superset_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: superset_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: superset_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - superset
    restart: unless-stopped

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset_app
    ports:
      - "8088:8088"
    volumes:
      - ./data:/home/superset/db_folder
      - ./superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    env_file:
      - .env
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - PREVENT_UNSAFE_DB_CONNECTIONS=False
      - SUPERSET_HOME=/app/superset_home
      - PYTHONPATH=/app/pythonpath
    depends_on:
      - db
      - redis
    entrypoint: >
      sh -c "
      superset db upgrade &&
      superset init &&
      gunicorn --bind 0.0.0.0:8088 --workers 4 --worker-class gthread --threads 8 --timeout 120 --limit-request-line 0 --limit-request-field_size 0 'superset.app:create_app()'"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  loader:
    build:
      context: .
      dockerfile: Dockerfile.loader
    container_name: metrika_loader
    volumes:
      - ./script:/app
      - ./data:/app/data
    working_dir: /app
    env_file:
      - .env
    depends_on:
      - db
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
      - SUPERSET_INTERNAL_URL=http://superset:8088
      - SUPERSET_ADMIN_USER=${SUPERSET_ADMIN_USER}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD}
    command: python scheduler.py
    restart: "on-failure:3"

volumes:
  postgres_data:
  redis_data:
